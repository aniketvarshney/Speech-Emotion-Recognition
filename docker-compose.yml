version: "3.9"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   
    environment:
      - TF_CPP_MIN_LOG_LEVEL=2  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000   
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy